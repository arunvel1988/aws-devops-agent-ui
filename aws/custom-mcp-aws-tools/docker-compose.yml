version: "3.9"

services:

  aws-devops-mcp:

    build:
      context: .

    container_name: aws-devops-mcp

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:

      MCP_SERVER_NAME: aws-ssm-process-manager

    networks:

      - mcp-network


networks:

  mcp-network:

    driver: bridge
