version: "3.9"

services:

  infrastructure-mcp-server:

    build:
      context: .

    container_name: infrastructure-mcp-server

    restart: unless-stopped


    ports:

      - "8080:8080"


    env_file:

      - .env


    environment:

      PYTHONUNBUFFERED: "1"



    volumes:

      - /var/run/docker.sock:/var/run/docker.sock



    command:

      - uvicorn

      - server:app

      - --host

      - 0.0.0.0

      - --port

      - "8080"



    networks:

      - mcp-network



networks:

  mcp-network:

    driver: bridge
