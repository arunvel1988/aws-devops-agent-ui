version: "3.9"

services:

  ec2-mcp:

    build:
      context: ./mcp-server

    container_name: ec2-mcp

    restart: unless-stopped

    privileged: true

    ports:
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro

    environment:
      PYTHONUNBUFFERED: "1"
      MCP_API_KEY: my-secret-key
